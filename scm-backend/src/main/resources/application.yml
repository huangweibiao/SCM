server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: scm-backend

  # DataSource Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/scm_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: SCM-HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # OAuth2 Client Configuration
  security:
    oauth2:
      client:
        registration:
          custom-oauth2:
            client-id: ${OAUTH2_CLIENT_ID:scm-client}
            client-secret: ${OAUTH2_CLIENT_SECRET:scm-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile,email
            client-name: SCM OAuth2
        provider:
          custom-oauth2:
            authorization-uri: ${OAUTH2_AUTH_URI:http://localhost:9000/oauth2/authorize}
            token-uri: ${OAUTH2_TOKEN_URI:http://localhost:9000/oauth2/token}
            user-info-uri: ${OAUTH2_USER_INFO_URI:http://localhost:9000/userinfo}
            user-name-attribute: sub
            jwk-set-uri: ${OAUTH2_JWK_URI:http://localhost:9000/oauth2/jwks}

  # Session Configuration (for SSO)
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
    timeout: 8h

  # Jackson Configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Logging Configuration
logging:
  level:
    root: INFO
    com.scm: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Application Custom Configuration
scm:
  security:
    # Permit all static resources and frontend routes
    permit-urls:
      - /
      - /index.html
      - /assets/**
      - /api/auth/**
      - /oauth2/**
      - /login/oauth2/**
      - /actuator/health
  frontend:
    # Frontend SPA routes - forward to index.html
    forward-routes:
      - /dashboard
      - /login
      - /supplier/**
      - /purchase/**
      - /inventory/**
      - /report/**
